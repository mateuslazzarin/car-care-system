version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: car-care-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: CarCareSystemDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: CarCareSystem.Api/Dockerfile
    container_name: car-care-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=CarCareSystemDb;Username=postgres;Password=password"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - car-care-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car-care-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api
    networks:
      - car-care-network

volumes:
  postgres_data:

networks:
  car-care-network:
    driver: bridge
